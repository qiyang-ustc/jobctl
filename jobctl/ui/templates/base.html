<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}jobctl{% endblock %}</title>
  <script>
    /* Set theme before paint (no flash). Default: stored pref, else system. */
    (function(){
      var t = localStorage.getItem('jobctl_theme') ||
              (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
      window.__toggleTheme = function(){
        var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', cur);
        localStorage.setItem('jobctl_theme', cur);
        var b = document.querySelector('.theme-btn'); if (b) b.textContent = cur === 'light' ? '☾' : '☀';
      };
    })();
    document.addEventListener('DOMContentLoaded', function(){
      var b = document.querySelector('.theme-btn');
      if (b) b.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☾' : '☀';
    });
  </script>
  <link rel="stylesheet" href="/static/app.css?v=5"/>
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/i18n.js" defer></script>
</head>
<body>
<div class="layout">

  <nav class="topnav" role="navigation">
    <a href="/" class="topnav-logo">jobctl</a>
    <div class="topnav-nav">
      <a href="/" data-i18n="nav.dashboard">Dashboard</a>
      <a href="/runs" data-i18n="nav.runs">Runs</a>
      <a href="/jobfiles" data-i18n="nav.jobs">Jobs</a>
      <a href="/servers" data-i18n="nav.servers">Servers</a>
    </div>
    <div class="lang-toggle" aria-label="Language toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>
    <button class="theme-btn" type="button" onclick="window.__toggleTheme()"
            aria-label="Toggle light/dark theme" title="Toggle theme">☀</button>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <span data-i18n="footer.label">jobctl</span> v{{ version }}
  </footer>

</div>
</body>
</html>
