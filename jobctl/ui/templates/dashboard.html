{% extends "base.html" %}
{% block title %}Dashboard — jobctl{% endblock %}

{% block content %}

<div class="page-head">
  <h1 data-i18n="nav.dashboard">Dashboard</h1>
</div>

{# ---- Section: Servers ---- #}
<div class="section-header">
  <span class="section-title" data-i18n="section.servers">Servers</span>
</div>

<div class="servers-grid mb-2" id="server-cards"
     hx-get="/ui/poll?section=servers"
     hx-trigger="every 15s"
     hx-swap="innerHTML">
  {% include "partials/servers.html" %}
</div>

<hr class="section-sep"/>

{# ---- Run Buckets ---- #}
<div id="run-buckets"
     hx-get="/ui/poll?section=buckets"
     hx-trigger="every 5s"
     hx-swap="innerHTML">
  {% include "partials/buckets.html" %}
</div>

{% endblock %}
